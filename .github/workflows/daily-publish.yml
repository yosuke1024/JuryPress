name: Daily Publish

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Target Date (YYYY-MM-DD)'
        required: false
      dry_run:
        description: 'Dry Run (do not commit or deploy)'
        type: boolean
        default: false

# schedule:
#   - cron: '15 15 * * *'

permissions:
  contents: write

# Prevent concurrent runs
concurrency:
  group: jurypress-daily-publish
  cancel-in-progress: false

jobs:
  evaluate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci

      - name: Check for GEMINI_API_KEY
        id: check_key
        run: |
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "missing_key=true" >> $GITHUB_OUTPUT
            echo "GEMINI_API_KEY is not set. Skipping generation."
          else
            echo "missing_key=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Daily Scripts
        if: steps.check_key.outputs.missing_key != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3.5-flash' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_DATE: ${{ github.event.inputs.date }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: npx tsx scripts/run-daily.ts

      - name: Build Astro Site
        env:
          PUBLIC_GA_MEASUREMENT_ID: ${{ vars.PUBLIC_GA_MEASUREMENT_ID }}
          PUBLIC_ADSENSE_CLIENT_ID: ${{ vars.PUBLIC_ADSENSE_CLIENT_ID }}
          PUBLIC_ADSENSE_SLOT_ARTICLE_1: ${{ vars.PUBLIC_ADSENSE_SLOT_ARTICLE_1 }}
          PUBLIC_ADSENSE_SLOT_ARTICLE_2: ${{ vars.PUBLIC_ADSENSE_SLOT_ARTICLE_2 }}
          PUBLIC_ADSENSE_SLOT_RANKING: ${{ vars.PUBLIC_ADSENSE_SLOT_RANKING }}
          PUBLIC_JUDGIE_URL: ${{ vars.PUBLIC_JUDGIE_URL }}
          PUBLIC_PIXAPPS_URL: ${{ vars.PUBLIC_PIXAPPS_URL }}
          JURYPRESS_DATA_MODE: production
        run: npm run build

      - name: Commit Generated Content
        if: ${{ !github.event.inputs.dry_run && steps.check_key.outputs.missing_key != 'true' }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(jurypress): publish daily review" && git push)
