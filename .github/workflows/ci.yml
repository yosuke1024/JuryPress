name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Typecheck
        env:
          JURYPRESS_DATA_MODE: fixture
        run: npm run typecheck
        
      - name: Run Unit Tests
        env:
          JURYPRESS_DATA_MODE: fixture
        run: npm run test:unit
        
      - name: Build
        env:
          JURYPRESS_DATA_MODE: fixture
        run: npm run build

      - name: Verify Fail Closed without Content Root
        run: |
          set +e
          OUTPUT=$(JURYPRESS_DATA_MODE=production JURYPRESS_SITE_URL=https://pixapps.ai npm run build 2>&1)
          STATUS=$?
          set -e
          if [ "$STATUS" -eq 0 ]; then
            echo "Error: Build succeeded in production mode without JURYPRESS_CONTENT_ROOT."
            exit 1
          fi
          echo "$OUTPUT" | grep -F "JURYPRESS_CONTENT_ROOT is required"

      - name: Verify Path Traversal Prevention
        run: |
          set +e
          OUTPUT=$(JURYPRESS_DATA_MODE=production JURYPRESS_SITE_URL=https://pixapps.ai JURYPRESS_CONTENT_ROOT="../etc" npm run build 2>&1)
          STATUS=$?
          set -e
          if [ "$STATUS" -eq 0 ]; then
            echo "Error: Build succeeded with traversal path."
            exit 1
          fi
          echo "$OUTPUT" | grep -F "Directory traversal attempt detected"

      - name: Verify Fixture Contamination Prevention
        run: |
          set +e
          OUTPUT=$(JURYPRESS_DATA_MODE=production JURYPRESS_SITE_URL=https://pixapps.ai JURYPRESS_CONTENT_ROOT="./tests/fixtures" npm run build 2>&1)
          STATUS=$?
          set -e
          if [ "$STATUS" -eq 0 ]; then
            echo "Error: Build succeeded with fixture data in production mode."
            exit 1
          fi
          echo "$OUTPUT" | grep -F "Data classification mismatch"
        
      - name: Install Playwright Browsers
        env:
          JURYPRESS_DATA_MODE: fixture
        run: npx playwright install --with-deps chromium
        
      - name: Run E2E Tests
        env:
          JURYPRESS_DATA_MODE: fixture
        run: npm run test:e2e

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout JuryPress
        uses: actions/checkout@v4
        with:
          path: jurypress

      - name: Checkout JuryPress-content
        uses: actions/checkout@v4
        with:
          repository: yosuke1024/JuryPress-content
          path: jurypress-content
          # JuryPress-contentがプライベートリポジトリの場合、チェックアウト用のPAT(トークン)シークレットが必要です
          token: ${{ secrets.CONTENT_REPO_PAT || github.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: jurypress/package-lock.json

      - name: Install Dependencies
        run: |
          cd jurypress
          npm ci

      - name: Deploy to Cloudflare
        env:
          BASE_PATH: '/jurypress'
          JURYPRESS_DATA_MODE: 'production'
          JURYPRESS_SITE_URL: 'https://pixapps.ai'
          JURYPRESS_CONTENT_ROOT: '${{ github.workspace }}/jurypress-content/data'
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd jurypress
          npm run deploy:cloudflare
