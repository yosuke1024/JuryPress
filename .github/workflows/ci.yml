name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Typecheck
        run: npm run typecheck
        
      - name: Run Unit Tests
        run: npm run test:unit
        
      - name: Build
        env:
          JURYPRESS_DATA_MODE: fixture
        run: npm run build

      - name: Verify Fail Closed without Content Root
        run: |
          if JURYPRESS_DATA_MODE=production npm run build; then
            echo "Error: Build succeeded in production mode without JURYPRESS_CONTENT_ROOT. Fail Closed failed."
            exit 1
          else
            echo "Success: Build correctly failed in production mode without JURYPRESS_CONTENT_ROOT."
          fi
        
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        
      - name: Run E2E Tests
        run: npm run test:e2e
